<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vine Climber: Glass Orb Edition</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; overflow: hidden;
            background: #1a2e1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            image-rendering: pixelated;
        }
        /* HUD */
        .hud {
            position: absolute;
            pointer-events: none;
            user-select: none;
        }
        #score-display {
            top: 18px; left: 20px;
            font-size: 26px; font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        #best-display {
            top: 18px; right: 20px;
            font-size: 13px; font-weight: 600;
            color: rgba(255,255,255,0.6);
            text-align: right;
        }
        /* Overlay */
        #overlay {
            position: absolute; inset: 0;
            background: rgba(10, 25, 10, 0.55);
            backdrop-filter: blur(12px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            pointer-events: auto;
            z-index: 20;
        }
        #overlay.hidden { display: none; }
        .card {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 28px;
            padding: 36px 40px;
            text-align: center;
            max-width: 320px;
            width: 90vw;
        }
        .card h1 { margin: 0 0 6px; font-size: 2rem; font-weight: 900; color: #a3e635; letter-spacing: -0.5px; }
        .card p { margin: 0 0 20px; color: rgba(255,255,255,0.55); font-size: 0.9rem; line-height: 1.4; }
        #final-score { font-size: 3rem; font-weight: 900; color: #4ade80; margin: 0 0 4px; }
        #personal-best-label { font-size: 0.8rem; color: rgba(255,255,255,0.45); margin: 0 0 20px; }
        .btn {
            display: block; width: 100%;
            padding: 14px;
            border-radius: 100px;
            border: none; cursor: pointer;
            font-size: 1rem; font-weight: 700;
            transition: transform 0.15s, filter 0.15s;
            margin-bottom: 10px;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: #4ade80; color: #052e16; }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.14); }
        .controls-hint {
            margin-top: 18px;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.3);
            line-height: 1.6;
        }
        .new-best-badge {
            display: inline-block;
            background: #fbbf24;
            color: #451a03;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 2px 10px;
            border-radius: 100px;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="score-display" class="hud">0</div>
    <div id="best-display" class="hud">Best: 0</div>
    <div id="overlay">
        <div class="card">
            <h1 id="overlay-title">Vine Climber</h1>
            <p id="overlay-msg">Guide the glass orb upward.<br>Avoid the thorns. Don't fall.</p>
            <div id="final-score" style="display:none">0</div>
            <div id="personal-best-label" style="display:none"></div>
            <div id="new-best-badge" class="new-best-badge" style="display:none">New Best!</div>
            <button id="start-btn" class="btn btn-primary">Start Journey</button>
            <button id="tilt-btn" class="btn btn-secondary">Enable Tilt Controls</button>
            <p class="controls-hint">
                Mouse / touch to steer &nbsp;·&nbsp; ←→ or A/D keys<br>
                Tilt requires HTTPS + mobile device
            </p>
        </div>
    </div>
</div>

<script>
// ─── Canvas setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const CW = 400, CH = 650;
let DPR = 1;

function resize() {
    DPR = window.devicePixelRatio || 1;
    const maxW = window.innerWidth, maxH = window.innerHeight;
    const scale = Math.min(maxW / CW, maxH / CH);
    const w = Math.floor(CW * scale), h = Math.floor(CH * scale);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    canvas.width = Math.floor(CW * DPR);
    canvas.height = Math.floor(CH * DPR);
    ctx.scale(DPR, DPR);
}
window.addEventListener('resize', resize);
resize();

// ─── Audio ───────────────────────────────────────────────────────────────────
let audioCtx = null;
function getAC() { return audioCtx || (audioCtx = new (window.AudioContext || window.webkitAudioContext)()); }

function beep(freq, endFreq, type, vol, dur, startDelay = 0) {
    try {
        const ac = getAC();
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain); gain.connect(ac.destination);
        osc.type = type;
        const t = ac.currentTime + startDelay;
        osc.frequency.setValueAtTime(freq, t);
        if (endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, t + dur);
        gain.gain.setValueAtTime(vol, t);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        osc.start(t); osc.stop(t + dur + 0.01);
    } catch(e) {}
}

const SFX = {
    jump()    { beep(380, 680, 'sine', 0.12, 0.12); },
    spring()  { beep(500, 1100, 'sine', 0.18, 0.18); },
    land()    { beep(160, 100, 'sine', 0.08, 0.07); },
    death()   {
        for (let i = 0; i < 6; i++)
            beep(800 - i * 90, 60, 'sawtooth', 0.07, 0.25, i * 0.06);
    },
    milestone() {
        [523, 659, 784, 1047].forEach((f, i) => beep(f, f * 1.02, 'sine', 0.1, 0.12, i * 0.1));
    }
};

// ─── Globals ──────────────────────────────────────────────────────────────────
const GRAVITY       = 0.35;
const JUMP_VY       = -11;
const SPRING_VY     = -17;
const ORB_R         = 15;
const PLAT_COUNT    = 9;
const PLAT_GAP      = 85;   // vertical spacing between platforms

let gameState = 'START'; // START | PLAYING | GAMEOVER
let score = 0;
let bestScore = parseInt(localStorage.getItem('vcBest') || '0', 10);
let cameraY = 0;

// Input
let mouseX = CW / 2;
let keyLeft = false, keyRight = false;
let tiltX = 0, useTilt = false, tiltActive = false;

// Screen shake
let shakeAmt = 0;

// Milestone banners
const MILESTONES = [100, 250, 500, 1000, 2000, 5000];
let nextMilestone = 0;
let banners = []; // {text, life, maxLife, y}

// Background leaves (parallax)
const BG_LEAVES = Array.from({length: 18}, () => ({
    x: Math.random() * CW,
    y: Math.random() * CH * 3,
    r: 6 + Math.random() * 10,
    speed: 0.3 + Math.random() * 0.5,
    alpha: 0.04 + Math.random() * 0.08,
    angle: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.02
}));

// ─── Particles ────────────────────────────────────────────────────────────────
let particles = [];

function spawnLanding(x, y) {
    for (let i = 0; i < 10; i++) {
        const ang = Math.PI + (Math.random() - 0.5) * 1.2;
        const spd = 1 + Math.random() * 3;
        particles.push({
            x, y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd - 1,
            life: 22 + Math.random() * 14, maxLife: 36,
            r: 2 + Math.random() * 2,
            color: Math.random() > 0.5 ? '#4ade80' : '#86efac'
        });
    }
}

function spawnDeath(x, y) {
    for (let i = 0; i < 28; i++) {
        const ang = Math.random() * Math.PI * 2;
        const spd = 1.5 + Math.random() * 5;
        particles.push({
            x, y, vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
            life: 35 + Math.random() * 25, maxLife: 60,
            r: 1.5 + Math.random() * 3,
            color: `rgba(${180 + Math.random() * 75 | 0}, ${220 + Math.random() * 35 | 0}, 255, 1)`
        });
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.18; p.vx *= 0.97;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function drawParticles() {
    for (const p of particles) {
        ctx.save();
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y - cameraY, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

// ─── Orb ──────────────────────────────────────────────────────────────────────
const orb = {
    x: CW / 2, y: CH - 120,
    vx: 0, vy: 0,
    dead: false,
    deadTimer: 0,

    reset() {
        this.x = CW / 2; this.y = CH - 120;
        this.vx = 0; this.vy = 0;
        this.dead = false; this.deadTimer = 0;
    },

    update() {
        if (this.dead) { this.deadTimer++; return; }

        // Horizontal control
        if (useTilt && tiltActive) {
            this.vx += tiltX * 0.38;
            this.vx *= 0.90;
        } else if (keyLeft || keyRight) {
            this.vx += (keyRight ? 1 : -1) * 0.9;
            this.vx = Math.max(-8, Math.min(8, this.vx));
            this.vx *= 0.88;
        } else {
            // Mouse / touch
            this.vx = (mouseX - this.x) * 0.15;
        }

        this.x += this.vx;
        this.vy += GRAVITY;
        this.y += this.vy;

        // Wrap horizontally
        if (this.x < -ORB_R) this.x = CW + ORB_R;
        if (this.x > CW + ORB_R) this.x = -ORB_R;

        // Camera follows orb upward
        if (this.y < cameraY + CH * 0.4) cameraY = this.y - CH * 0.4;
    },

    draw() {
        const sy = this.y - cameraY;
        ctx.save();
        if (this.dead) {
            // Draw nothing — particles handle the effect
        } else {
            // Glass orb
            ctx.translate(this.x, sy);
            // Subtle wobble shadow
            ctx.beginPath();
            ctx.ellipse(0, ORB_R + 2, ORB_R * 0.6, 4, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.12)';
            ctx.fill();
            ctx.translate(0, 0);

            const grad = ctx.createRadialGradient(-4, -5, 2, 0, 0, ORB_R);
            grad.addColorStop(0,   'rgba(255,255,255,0.95)');
            grad.addColorStop(0.25,'rgba(200,240,255,0.65)');
            grad.addColorStop(0.7, 'rgba(140,210,255,0.25)');
            grad.addColorStop(1,   'rgba(100,180,255,0.08)');
            ctx.beginPath();
            ctx.arc(0, 0, ORB_R, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // Rim highlight
            ctx.strokeStyle = 'rgba(255,255,255,0.45)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Specular dot
            ctx.beginPath();
            ctx.arc(-5, -5, 4, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.fill();
        }
        ctx.restore();
    }
};

// ─── Platform ─────────────────────────────────────────────────────────────────
class Platform {
    constructor(y, isFirst = false) {
        this.isFirst = isFirst;
        this.height = 10;
        this.bounced = false; // for land SFX dedup
        this.init(y, isFirst);
    }

    init(y, isFirst = false) {
        this.y = y;
        if (isFirst) {
            this.x = (CW - 140) / 2;
            this.w = 140;
            this.type = 'normal';
            this.speed = 0;
            return;
        }
        this.w = 60 + Math.random() * 40;
        this.x = Math.random() * (CW - this.w);

        const r = Math.random();
        if (r < 0.15) this.type = 'spring';
        else if (r < 0.35) this.type = 'moving';
        else this.type = 'normal';

        this.speed = (this.type === 'moving') ? (1 + Math.random() * 1.5) * (Math.random() > 0.5 ? 1 : -1) : 0;
        this.bounced = false;
    }

    reset(y) { this.init(y); }

    update() {
        if (this.type === 'moving') {
            this.x += this.speed;
            if (this.x < 0 || this.x + this.w > CW) this.speed *= -1;
        }
    }

    draw() {
        const sy = this.y - cameraY;
        ctx.save();

        if (this.type === 'spring') {
            // Spring coil
            ctx.strokeStyle = '#7dd3fc';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            const cx = this.x + this.w / 2;
            ctx.beginPath();
            ctx.moveTo(cx - 10, sy + this.height / 2);
            ctx.lineTo(cx - 10, sy - 8);
            ctx.lineTo(cx + 10, sy - 8);
            ctx.lineTo(cx + 10, sy + this.height / 2);
            ctx.stroke();
            // Blue pad
            ctx.fillStyle = '#0ea5e9';
            ctx.beginPath();
            ctx.roundRect(this.x, sy - 2, this.w, this.height, 5);
            ctx.fill();
            ctx.strokeStyle = '#7dd3fc';
            ctx.lineWidth = 1;
            ctx.stroke();
        } else {
            // Vine branch
            const color = this.type === 'moving' ? '#ca8a04' : '#166534';
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(this.x, sy + this.height / 2);
            ctx.quadraticCurveTo(this.x + this.w / 2, sy - 4, this.x + this.w, sy + this.height / 2);
            ctx.stroke();

            // Leaves
            const leafColor = this.type === 'moving' ? ['#eab308','#a16207'] : ['#22c55e','#15803d'];
            const count = Math.floor(this.w / 22);
            for (let i = 0; i <= count; i++) {
                const lx = this.x + (this.w / count) * i;
                const ly = sy + this.height / 2;
                ctx.fillStyle = i % 2 === 0 ? leafColor[0] : leafColor[1];
                ctx.beginPath();
                ctx.ellipse(lx, ly - 1, 7, 3.5, i % 2 === 0 ? 0.4 : -0.4, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        ctx.restore();
    }
}

// ─── Enemy (Thorn Orb) ────────────────────────────────────────────────────────
class Enemy {
    constructor(y, speed) {
        this.r = 11;
        this.x = Math.random() > 0.5 ? -60 : CW + 60;
        this.y = y;
        this.speed = speed * (this.x < 0 ? 1 : -1);
        this.angle = 0;
    }

    update() {
        this.x += this.speed;
        this.angle += 0.06;
    }

    draw() {
        const sy = this.y - cameraY;
        ctx.save();
        ctx.translate(this.x, sy);
        ctx.rotate(this.angle);

        // Spikes
        ctx.strokeStyle = '#7f1d1d';
        ctx.lineWidth = 2;
        for (let i = 0; i < 8; i++) {
            ctx.save();
            ctx.rotate((Math.PI / 4) * i);
            ctx.beginPath();
            ctx.moveTo(0, -this.r);
            ctx.lineTo(0, -this.r - 7);
            ctx.stroke();
            ctx.restore();
        }

        // Body
        const grad = ctx.createRadialGradient(-3, -3, 1, 0, 0, this.r);
        grad.addColorStop(0, '#ef4444');
        grad.addColorStop(1, '#450a0a');
        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();

        // Gleam
        ctx.beginPath();
        ctx.arc(-3, -3, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,180,180,0.5)';
        ctx.fill();
        ctx.restore();
    }

    isOffscreen() {
        return this.x < -120 || this.x > CW + 120 || this.y > cameraY + CH + 120;
    }
}

// ─── Game Objects ─────────────────────────────────────────────────────────────
let platforms = [];
let enemies   = [];

function initGame() {
    platforms = [];
    enemies   = [];
    particles = [];
    banners   = [];
    cameraY   = 0;
    score     = 0;
    nextMilestone = 0;
    shakeAmt  = 0;

    // Spread platforms evenly from bottom up
    for (let i = 0; i < PLAT_COUNT; i++) {
        const y = CH - 80 - i * PLAT_GAP;
        platforms.push(new Platform(y, i === 0));
    }

    orb.reset();
    mouseX = CW / 2;
}

// ─── Collision ────────────────────────────────────────────────────────────────
function checkPlatformCollisions() {
    if (orb.vy <= 0 || orb.dead) return;
    for (const p of platforms) {
        const prevY = orb.y - orb.vy;
        const bottom = orb.y + ORB_R;
        const prevBottom = prevY + ORB_R;
        if (prevBottom <= p.y + 2 && bottom >= p.y &&
            orb.x + ORB_R - 4 > p.x && orb.x - ORB_R + 4 < p.x + p.w) {

            if (p.type === 'spring') {
                orb.vy = SPRING_VY;
                SFX.spring();
            } else {
                orb.vy = JUMP_VY;
                if (!p.bounced) { SFX.jump(); SFX.land(); p.bounced = true; }
            }
            spawnLanding(orb.x, p.y);
            orb.y = p.y - ORB_R;
        }
    }
}

function checkEnemyCollisions() {
    if (orb.dead) return;
    for (const e of enemies) {
        const dx = orb.x - e.x, dy = orb.y - e.y;
        if (Math.sqrt(dx * dx + dy * dy) < ORB_R + e.r - 4) {
            triggerDeath();
            return;
        }
    }
}

// ─── Death / End ──────────────────────────────────────────────────────────────
function triggerDeath() {
    if (orb.dead) return;
    orb.dead = true;
    shakeAmt = 14;
    SFX.death();
    spawnDeath(orb.x, orb.y);
    setTimeout(showGameOver, 1100);
}

function showGameOver() {
    gameState = 'GAMEOVER';

    const isNew = score > bestScore;
    if (isNew) {
        bestScore = score;
        localStorage.setItem('vcBest', bestScore);
    }

    document.getElementById('overlay-title').textContent = orb.dead ? 'Shattered' : 'Fallen';
    document.getElementById('overlay-msg').textContent   = 'Your orb found its fate.';
    document.getElementById('final-score').style.display = 'block';
    document.getElementById('final-score').textContent   = score;
    document.getElementById('personal-best-label').style.display = 'block';
    document.getElementById('personal-best-label').textContent   = `Best: ${bestScore}`;
    document.getElementById('new-best-badge').style.display = isNew ? 'inline-block' : 'none';
    document.getElementById('start-btn').textContent = 'Rise Again';
    document.getElementById('overlay').classList.remove('hidden');
    document.getElementById('best-display').textContent = 'Best: ' + bestScore;
}

// ─── Update ───────────────────────────────────────────────────────────────────
function update() {
    if (gameState !== 'PLAYING') return;

    shakeAmt *= 0.8;
    if (shakeAmt < 0.5) shakeAmt = 0;

    orb.update();
    checkPlatformCollisions();
    checkEnemyCollisions();
    updateParticles();

    // Platform recycling — find highest platform, place recycled one above it
    for (const p of platforms) {
        p.bounced = false; // reset land SFX flag each frame (keep it simple)
        p.update();
        if (p.y > cameraY + CH + 50) {
            const topY = Math.min(...platforms.map(pl => pl.y));
            p.reset(topY - PLAT_GAP - Math.random() * 20);
        }
    }

    // Enemy spawning — scale with score
    const spawnRate = 0.003 + Math.min(score / 80000, 0.012);
    if (Math.random() < spawnRate) {
        const speedBonus = Math.min(score / 3000, 2.5);
        enemies.push(new Enemy(cameraY - 30, 1.4 + Math.random() * 1.2 + speedBonus));
    }
    for (let i = enemies.length - 1; i >= 0; i--) {
        enemies[i].update();
        if (enemies[i].isOffscreen()) enemies.splice(i, 1);
    }

    // Background leaves drift
    for (const leaf of BG_LEAVES) {
        leaf.y += leaf.speed;
        leaf.angle += leaf.spin;
        // Wrap in world space relative to camera with large buffer
        if (leaf.y > cameraY + CH + 100) leaf.y = cameraY - 100;
    }

    // Score
    const newScore = Math.max(score, Math.floor(-orb.y + (CH - 120)));
    if (newScore > score) {
        score = newScore;
        document.getElementById('score-display').textContent = score;
    }

    // Milestones
    if (score >= MILESTONES[nextMilestone]) {
        banners.push({ text: `${MILESTONES[nextMilestone]}!`, life: 90, maxLife: 90, y: CH / 2 });
        SFX.milestone();
        nextMilestone++;
    }

    for (let i = banners.length - 1; i >= 0; i--) {
        banners[i].life--;
        banners[i].y -= 0.6;
        if (banners[i].life <= 0) banners.splice(i, 1);
    }

    // Fall off bottom = death
    if (!orb.dead && orb.y > cameraY + CH + 80) triggerDeath();
}

// ─── Draw ────────────────────────────────────────────────────────────────────
function drawBackground() {
    // Gradient sky
    const grad = ctx.createLinearGradient(0, 0, 0, CH);
    const depth = Math.min(1, score / 3000);
    const r1 = Math.round(22 + depth * 10),  g1 = Math.round(46 + depth * 20),  b1 = Math.round(22 + depth * 40);
    const r2 = Math.round(15 + depth * 5),   g2 = Math.round(30 + depth * 10),  b2 = Math.round(15 + depth * 30);
    grad.addColorStop(0, `rgb(${r1},${g1},${b1})`);
    grad.addColorStop(1, `rgb(${r2},${g2},${b2})`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, CW, CH);

    // Parallax leaves
    ctx.save();
    for (const leaf of BG_LEAVES) {
        const sy = leaf.y - cameraY * 0.4; // parallax factor
        if (sy < -20 || sy > CH + 20) continue;
        ctx.save();
        ctx.translate(leaf.x, sy);
        ctx.rotate(leaf.angle);
        ctx.globalAlpha = leaf.alpha;
        ctx.fillStyle = '#4ade80';
        ctx.beginPath();
        ctx.ellipse(0, 0, leaf.r, leaf.r * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
    ctx.restore();

    // Subtle vine on left
    ctx.save();
    ctx.globalAlpha = 0.07;
    ctx.strokeStyle = '#4ade80';
    ctx.lineWidth = 16;
    ctx.lineCap = 'round';
    const vOff = (-cameraY * 0.2) % CH;
    ctx.beginPath();
    ctx.moveTo(30, vOff);
    ctx.bezierCurveTo(90, vOff + 160, -20, vOff + 320, 60, vOff + 480);
    ctx.bezierCurveTo(120, vOff + 620, 10, vOff + 780, 50, vOff + 900);
    ctx.stroke();
    ctx.restore();
}

function drawBanners() {
    for (const b of banners) {
        const t = b.life / b.maxLife;
        ctx.save();
        ctx.globalAlpha = t < 0.3 ? t / 0.3 : 1;
        ctx.font = 'bold 36px -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#a3e635';
        ctx.shadowColor = '#4ade80';
        ctx.shadowBlur = 20;
        ctx.fillText(b.text, CW / 2, b.y);
        ctx.restore();
    }
}

function draw() {
    ctx.save();
    if (shakeAmt > 0) {
        ctx.translate(
            (Math.random() - 0.5) * shakeAmt,
            (Math.random() - 0.5) * shakeAmt
        );
    }

    drawBackground();
    platforms.forEach(p => p.draw());
    enemies.forEach(e => e.draw());
    drawParticles();
    orb.draw();
    drawBanners();

    ctx.restore();
}

// ─── Game loop ────────────────────────────────────────────────────────────────
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// ─── Start / Game over ───────────────────────────────────────────────────────
function startGame() {
    try { getAC().resume(); } catch(e) {}
    initGame();
    gameState = 'PLAYING';
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('final-score').style.display = 'none';
    document.getElementById('personal-best-label').style.display = 'none';
    document.getElementById('new-best-badge').style.display = 'none';
    document.getElementById('score-display').textContent = '0';
    document.getElementById('best-display').textContent = 'Best: ' + bestScore;
}

document.getElementById('start-btn').addEventListener('click', startGame);

// ─── Tilt ────────────────────────────────────────────────────────────────────
const tiltBtn = document.getElementById('tilt-btn');

async function requestTilt() {
    tiltBtn.textContent = 'Requesting…';
    if (typeof DeviceOrientationEvent !== 'undefined') {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const perm = await DeviceOrientationEvent.requestPermission();
                if (perm === 'granted') startTilt();
                else tiltBtn.textContent = 'Permission Denied';
            } catch(e) { tiltBtn.textContent = 'Error'; }
        } else {
            startTilt();
        }
    } else {
        tiltBtn.textContent = 'Not Supported';
    }
}

function startTilt() {
    useTilt = true;
    window.addEventListener('deviceorientation', e => {
        if (e.gamma !== null) { tiltX = e.gamma; tiltActive = true; }
    });
    setTimeout(() => {
        if (!tiltActive) tiltBtn.textContent = 'No Sensor Data';
        else { tiltBtn.textContent = 'Tilt Active ✓'; tiltBtn.style.opacity = '0.5'; }
    }, 1000);
}

tiltBtn.addEventListener('click', requestTilt);

// ─── Input ───────────────────────────────────────────────────────────────────
function getCanvasX(clientX) {
    const rect = canvas.getBoundingClientRect();
    return (clientX - rect.left) * (CW / rect.width);
}

window.addEventListener('mousemove', e => {
    if (!useTilt || !tiltActive) mouseX = getCanvasX(e.clientX);
});

window.addEventListener('touchmove', e => {
    if (gameState === 'PLAYING') e.preventDefault();
    if (!useTilt || !tiltActive) mouseX = getCanvasX(e.touches[0].clientX);
}, { passive: false });

window.addEventListener('touchstart', e => {
    if (gameState === 'PLAYING') e.preventDefault();
    if (!useTilt || !tiltActive) mouseX = getCanvasX(e.touches[0].clientX);
}, { passive: false });

window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') keyLeft  = true;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keyRight = true;
});
window.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft'  || e.key === 'a' || e.key === 'A') keyLeft  = false;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keyRight = false;
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
document.getElementById('best-display').textContent = 'Best: ' + bestScore;
initGame();
loop();
</script>
</body>
</html>
